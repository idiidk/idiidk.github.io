<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ripple</title>
  </head>

  <body>
    <div class="text">
      <h1>gang og</h1>
      <h4>Cookies: <span id="cookies"></span></h4>
      <a href="https://twitter.com/idiidka">@idiidk</a>
    </div>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/YbvrM6Nj2Ok?autoplay=1"
      frameborder="0"
      allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>

    <style>
      html {
        color: white;
        font-size: 5vh;
        text-align: center;
        background-color: black;
        overflow: hidden;
      }

      h1,
      h4,
      a {
        padding: 0;
        margin: 0;
      }

      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1000;
      }

      .text {
        position: absolute;
        width: 100vw;
        top: 0;
        left: 0;
        background-color: black;
      }
    </style>

    <script>
      setTimeout(function() {
        $("#cookies").html(document.cookie);
      }, 2000);
    </script>
  </body>
</html>
